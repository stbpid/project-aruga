<!DOCTYPE html>
<html>
<head>
  <title>Test Interviewer Validation</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 600px; margin: 0 auto; }
    input, button { padding: 10px; margin: 5px; font-size: 16px; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h2>Test Interviewer Code Validation</h2>
  
  <div>
    <input type="text" id="code" placeholder="Enter 8-digit code" maxlength="8" />
    <button onclick="testValidation()">Validate</button>
  </div>
  
  <div id="result"></div>

  <script>
    async function testValidation() {
      const code = document.getElementById('code').value.trim();
      const resultDiv = document.getElementById('result');
      
      if (!code) {
        resultDiv.innerHTML = '<p class="error">Please enter a code</p>';
        return;
      }
      
      resultDiv.innerHTML = '<p>Testing...</p>';
      
      try {
        const response = await fetch('/api/validate-interviewer.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ interviewer_code: code })
        });
        
        const data = await response.json();
        
        if (data.success) {
          resultDiv.innerHTML = `
            <h3 class="success">✅ Success!</h3>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          `;
        } else {
          resultDiv.innerHTML = `
            <h3 class="error">❌ Failed</h3>
            <p>${data.message}</p>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          `;
        }
      } catch (error) {
        resultDiv.innerHTML = `
          <h3 class="error">❌ Error</h3>
          <p>${error.message}</p>
        `;
      }
    }
  </script>
</body>
</html>
