<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Aruga - Profiling Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col font-sans">

  <!-- HEADER -->
  <header class="w-full bg-[#f6f8f6f2] border-b border-[#e0e4e0] h-14 sticky top-0 z-50 backdrop-blur-sm">
    <div class="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
      
      <div class="flex items-center gap-2">
        <img 
          src="https://lh3.googleusercontent.com/d/1PXQxz3l0uxl0zEo1Lw5R4Qrd41yXbQ6V" 
          class="h-10 w-auto object-contain"
          alt="Project Logo"
        >
        <h2 class="font-bold text-brand-dark text-sm sm:text-xl leading-tight whitespace-nowrap">
          Project Aruga
        </h2>
      </div>

      <div class="flex items-center gap-2 sm:gap-3">
        
        <div class="hidden md:flex items-center gap-1 text-brand-dark mr-2">
          <svg class="w-3 h-3 text-gray-500" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
          </svg>
          <span id="interviewer-code" class="font-bold text-xs">---</span>
        </div>

        <div class="flex items-center gap-1 bg-white border border-gray-200 px-2 py-1 rounded shadow-sm">
          <svg class="w-3 h-3 text-brand-blue animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span id="session-timer" class="text-xs font-bold text-brand-blue w-[34px] text-center">
            00:00
          </span>
        </div>
        
        <button 
          class="bg-red-600 hover:bg-red-700 text-white text-[10px] sm:text-xs font-medium px-2 py-1.5 rounded transition-colors shadow-sm flex items-center gap-1" 
          onclick="showLogoutModal()"
        >
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
          <span class="hidden sm:inline">End Session</span>
          <span class="sm:hidden">Exit</span>
        </button>

      </div>
    </div>
  </header>

  <!-- LOGOUT MODAL -->
  <div id="logout-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
    
    <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity" onclick="hideLogoutModal()"></div>
    
    <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all scale-100">
      
      <div class="bg-red-50 p-4 flex justify-center">
        <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center">
          <svg class="w-6 h-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        </div>
      </div>

      <div class="p-6 text-center">
        <h3 class="text-lg font-bold text-gray-900 mb-2">End Session?</h3>
        <p class="text-sm text-gray-500">
          Are you sure you want to end your session? <br>
          <span class="font-bold text-red-500">All unsaved data will be lost.</span>
        </p>
      </div>

      <div class="flex border-t border-gray-100">
        <button 
          onclick="hideLogoutModal()" 
          class="w-1/2 px-4 py-3 text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition-colors border-r border-gray-100 focus:outline-none"
        >
          Cancel
        </button>
        <button 
          onclick="confirmLogout()" 
          class="w-1/2 px-4 py-3 text-sm font-bold text-white bg-red-600 hover:bg-red-700 transition-colors focus:outline-none"
        >
          Yes, End Session
        </button>
      </div>

    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="flex-grow flex flex-col items-center p-4 sm:p-6 space-y-5 max-w-5xl mx-auto w-full">
    
    <!-- PROGRESS SECTION -->
    <section id="progress-section" class="w-full bg-white rounded-xl border border-[#dce0e5] shadow-sm p-4">
      <div class="flex justify-between items-center mb-1.5">
        <h2 class="font-bold text-brand-dark text-xs sm:text-sm">Registration Progress</h2>
        <div id="step-indicator" class="bg-blue-50 px-2 py-0.5 rounded text-brand-blue text-[10px] font-bold tracking-wider">STEP 1 OF 10</div>
      </div>
      <div class="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-brand-blue w-0 rounded-full transition-all duration-500 ease-out"></div>
      </div>
      <p id="step-label" class="mt-1.5 text-[10px] sm:text-xs text-gray-400 font-medium">Pre-Qualification</p>
    </section>

    <!-- STEP CONTAINERS -->
    <div id="steps-container" class="w-full">
      <!-- Steps will be dynamically loaded here -->
      <div class="text-center py-20">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-brand-blue"></div>
        <p class="mt-4 text-gray-500">Loading profiling tool...</p>
      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="mt-auto border-t border-gray-800 bg-gray-900 py-4 text-center px-4">
    <p class="text-[10px] sm:text-xs text-gray-300 font-light tracking-wide">
      © 2026 Department of Social Welfare Development - Social Technology Bureau
    </p>
  </footer>

  <script src="/js/toast.js"></script>
  <script src="/js/profiling.js"></script>
</body>
</html>
